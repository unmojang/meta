name: "update"
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: cachix/install-nix-action@v20
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
    - uses: cachix/cachix-action@v12
      with:
        name: unmojang
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    - run: |
        install -Dm 600 <(echo "$SSH_KEY") ~/.ssh/id_ed25519
    - run: |
        ./clone.sh
        nix run
